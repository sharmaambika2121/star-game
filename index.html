<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAR GUARDIAN: ULTIMATE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; font-weight: bold; font-size: 14px; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 30px; border: 3px solid #0af; z-index: 20; border-radius: 10px; }
        #warn { position: absolute; top: 25%; width: 100%; text-align: center; color: #f00; font-size: 24px; display: none; font-weight: bold; animation: blink 0.5s infinite; z-index: 5; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="ui">
        LEVEL: <span id="lvl-ui">1</span> | SCORE: <span id="score-ui">0</span><br>
        LIVES: <span id="lives-ui">3</span> | SHIELD: <span id="shield-ui">0%</span>
    </div>
    <div id="warn">WARNING: BOSS APPROACHING</div>
    <div id="msg">
        <h1 id="status-text">MISSION FAILED</h1>
        <p>TAP TO RESTART</p>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const ui = {
            lvl: document.getElementById('lvl-ui'),
            score: document.getElementById('score-ui'),
            lives: document.getElementById('lives-ui'),
            shield: document.getElementById('shield-ui'),
            msg: document.getElementById('msg'),
            warn: document.getElementById('warn')
        };

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score, lives, level, gameOver, frame, weaponLevel, shield, isBossActive, hyperJump;
        let projectiles, enemyProjectiles, enemies, stars, bonuses, boss;
        let player = { x: canvas.width/2, y: canvas.height-120, w: 40, h: 50, targetX: canvas.width/2, targetY: canvas.height-120 };

        function init() {
            score = 0; lives = 3; level = 1; gameOver = false; frame = 0;
            weaponLevel = 1; shield = 0; isBossActive = false; hyperJump = 0;
            projectiles = []; enemyProjectiles = []; enemies = []; stars = []; bonuses = []; boss = null;
            for(let i=0; i<100; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 + 1 });
            ui.msg.style.display = 'none';
            updateUI();
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v=0.05) {
            if(audioCtx.state === 'suspended') return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function updateUI() {
            ui.lvl.innerText = level; ui.score.innerText = score;
            ui.lives.innerText = lives; ui.shield.innerText = shield > 0 ? "100%" : "0%";
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Estela de propulsión estilizada
            const engineThrust = 15 + Math.random() * 10;
            const gradFire = ctx.createLinearGradient(0, 0, 0, engineThrust);
            gradFire.addColorStop(0, '#0af');
            gradFire.addColorStop(1, 'transparent');
            ctx.fillStyle = gradFire;
            ctx.fillRect(-5, 20, 10, engineThrust);

            // Alas dinámicas
            ctx.fillStyle = "#4a90e2";
            ctx.beginPath();
            ctx.moveTo(-25, 15); ctx.lineTo(0, -10); ctx.lineTo(25, 15); ctx.lineTo(0, 5);
            ctx.fill();

            // Cuerpo Central (Cabina con gradiente)
            const bodyGrad = ctx.createLinearGradient(-10, -20, 10, 20);
            bodyGrad.addColorStop(0, '#fff');
            bodyGrad.addColorStop(0.5, '#1a2a44');
            bodyGrad.addColorStop(1, '#000');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.moveTo(0, -25); ctx.lineTo(12, 15); ctx.lineTo(-12, 15);
            ctx.fill();

            // Escudo
            if(shield > 0) {
                ctx.strokeStyle = "#0af"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.stroke();
                ctx.globalAlpha = 0.2; ctx.fillStyle = "#0af"; ctx.fill();
            }
            ctx.restore();
        }

        function drawAlien(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            
            if(e.type === 0) { // Scout (Verde, movimiento rápido)
                ctx.fillStyle = "#aaff44";
                ctx.beginPath(); ctx.ellipse(0, 0, 15, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.fillRect(-8, -4, 4, 4); ctx.fillRect(4, -4, 4, 4);
            } else if(e.type === 1) { // Hunter (Rojo, zig-zag)
                ctx.fillStyle = "#ff4444";
                ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-15, -10); ctx.lineTo(15, -10); ctx.fill();
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
            } else if(e.type === 2) { // Tank (Morado, lento pero grande)
                ctx.fillStyle = "#aa44ff";
                ctx.fillRect(-20, -15, 40, 30);
                ctx.fillStyle = "#5500aa"; ctx.fillRect(-15, -10, 30, 20);
            } else { // Kamikaze (Naranja, busca al jugador)
                ctx.fillStyle = "#ffaa44";
                ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(10, 10); ctx.lineTo(-10, 10); ctx.fill();
                if(frame % 10 < 5) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill(); }
            }
            ctx.restore();
        }

        function update() {
            if (gameOver) return;
            frame++;
            if (hyperJump > 0) hyperJump--;

            // Movimiento 2D suavizado (Adelante/Atrás/Lados)
            player.x += (player.targetX - player.x) * 0.1;
            player.y += (player.targetY - player.y) * 0.1;

            stars.forEach(s => {
                s.y += s.s + (hyperJump > 0 ? 50 : level);
                if(s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
                ctx.fillStyle = "#fff"; ctx.fillRect(s.x, s.y, s.s, hyperJump > 0 ? 40 : s.s);
            });

            // Generación de tipos de Aliens
            if (!isBossActive && hyperJump === 0 && frame % Math.max(20, 50 - level * 5) === 0) {
                enemies.push({ 
                    x: Math.random() * canvas.width, 
                    y: -50, 
                    type: Math.floor(Math.random() * 4), 
                    speed: 2 + Math.random() * level,
                    sin: Math.random() * Math.PI,
                    hp: 1
                });
            }

            for(let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                // Comportamientos
                if(e.type === 1) e.x += Math.sin(frame * 0.05 + e.sin) * 3; // Zig-zag
                if(e.type === 3) e.x += (player.x - e.x) * 0.02; // Seguimiento
                
                e.y += e.speed;

                if (e.y > canvas.height + 50) { enemies.splice(i, 1); continue; }

                // Colisión Jugador
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                if (dist < 30) {
                    enemies.splice(i, 1);
                    if(shield > 0) shield = 0; else lives--;
                    updateUI(); playSfx(100, 'noise', 0.2);
                }

                // Colisión Balas
                for(let pi = projectiles.length - 1; pi >= 0; pi--) {
                    let p = projectiles[pi];
                    if (Math.hypot(p.x - e.x, p.y - e.y) < 25) {
                        if (Math.random() > 0.92) bonuses.push({ x: e.x, y: e.y, type: Math.random() > 0.5 ? 'W' : 'S' });
                        enemies.splice(i, 1); projectiles.splice(pi, 1);
                        score += 100; updateUI(); playSfx(300, 'noise', 0.05);
                        break;
                    }
                }
            }

            // Lógica de Boss y Niveles...
            if (!isBossActive && score >= level * 5000) {
                isBossActive = true; ui.warn.style.display = 'block';
                setTimeout(() => { ui.warn.style.display = 'none'; boss = { x: canvas.width/2, y: -100, hp: 50 * level, maxHp: 50 * level }; }, 2000);
            }

            if(boss) {
                boss.y += (boss.y < 100) ? 1 : 0;
                boss.x = canvas.width/2 + Math.sin(frame * 0.02) * (canvas.width/3);
                if(frame % 30 === 0) enemyProjectiles.push({ x: boss.x, y: boss.y, vy: 5 });
            }

            // Proyectiles y Bonus
            projectiles.forEach((p, i) => { 
                p.y -= 15; 
                if(boss && Math.hypot(p.x - boss.x, p.y - boss.y) < 50) {
                    boss.hp--; projectiles.splice(i, 1);
                    if(boss.hp <= 0) { boss = null; isBossActive = false; level++; hyperJump = 120; score += 2000; updateUI(); }
                }
                if(p.y < -50) projectiles.splice(i, 1); 
            });

            enemyProjectiles.forEach((ep, i) => {
                ep.y += ep.vy;
                if(Math.hypot(ep.x - player.x, ep.y - player.y) < 20) {
                    enemyProjectiles.splice(i, 1);
                    if(shield > 0) shield = 0; else lives--;
                    updateUI();
                }
                if(ep.y > canvas.height) enemyProjectiles.splice(i, 1);
            });

            bonuses.forEach((b, i) => {
                b.y += 2;
                if(Math.hypot(b.x - player.x, b.y - player.y) < 30) {
                    if(b.type === 'W') weaponLevel = Math.min(3, weaponLevel + 1); else shield = 1;
                    bonuses.splice(i, 1); updateUI(); playSfx(800, 'sine', 0.2);
                }
            });

            if (lives <= 0 && !gameOver) { gameOver = true; ui.msg.style.display = 'block'; }
            
            // Disparo progresivo
            if(frame % 12 === 0 && !gameOver && hyperJump === 0) {
                const shots = [{x: player.x, y: player.y - 20, vx: 0}];
                if(weaponLevel >= 2) { shots.push({x: player.x - 15, y: player.y, vx: -1}, {x: player.x + 15, y: player.y, vx: 1}); }
                if(weaponLevel >= 3) { shots.push({x: player.x - 25, y: player.y + 10, vx: -2}, {x: player.x + 25, y: player.y + 10, vx: 2}); }
                shots.forEach(s => projectiles.push(s));
                playSfx(600, 'square', 0.05, 0.02);
            }
        }

        function draw() {
            ctx.fillStyle = "#000510"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            update();
            enemies.forEach(drawAlien);
            if(boss) {
                ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(boss.x, boss.y, 60, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#f00"; ctx.fillRect(boss.x - 50, boss.y - 80, (boss.hp/boss.maxHp) * 100, 10);
            }
            drawPlayer();
            ctx.fillStyle = "#0ff"; projectiles.forEach(p => ctx.fillRect(p.x - 2, p.y, 4, 15));
            ctx.fillStyle = "#f00"; enemyProjectiles.forEach(ep => { ctx.beginPath(); ctx.arc(ep.x, ep.y, 8, 0, Math.PI*2); ctx.fill(); });
            bonuses.forEach(b => {
                ctx.fillStyle = b.type === 'W' ? "#f0f" : "#0af"; ctx.beginPath(); ctx.arc(b.x, b.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#fff"; ctx.fillText(b.type, b.x-5, b.y+5);
            });
            requestAnimationFrame(draw);
        }

        // Control tactil total (XY)
        canvas.addEventListener('touchmove', e => { 
            e.preventDefault(); 
            player.targetX = e.touches[0].clientX; 
            player.targetY = e.touches[0].clientY; 
            if(audioCtx.state === 'suspended') audioCtx.resume(); 
        }, {passive: false});
        
        canvas.addEventListener('touchstart', (e) => { 
            player.targetX = e.touches[0].clientX;
            player.targetY = e.touches[0].clientY;
            if(gameOver) init(); 
            audioCtx.resume(); 
        });

        init(); draw();
    </script>
</body>
</html>
